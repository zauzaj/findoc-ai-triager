default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default
  database: findoc_development
  url: <%= ENV.fetch('DATABASE_URL', 'postgres://localhost/findoc_development') %>

test:
  <<: *default
  database: findoc_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
