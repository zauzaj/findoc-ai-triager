version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: findoc
      POSTGRES_PASSWORD: findoc
      POSTGRES_DB: findoc_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./services.api.environment
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle exec rails db:create db:migrate db:seed &&
               bundle exec rails server -b 0.0.0.0 -p 3001"
    environment:
      DATABASE_URL: postgres://findoc:findoc@db:5432/findoc_development
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GOOGLE_CLIENT_ID_WEB: ${GOOGLE_CLIENT_ID_WEB:-}
      WEB_URL: http://localhost:3000
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/rails
      - api_gems:/usr/local/bundle

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_RAILS_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  api_gems:
  web_node_modules:
